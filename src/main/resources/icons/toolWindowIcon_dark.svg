<svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13">
    <!-- Прямоугольник: x=0.5, width=11 -> центр x=6.0 -->
    <!-- Ушки центрированы строго относительно прямоугольника (центр x=6.0) -->
    <!-- Левое ушко: основание от 1.7 до 4.3 (центр ушка 3.0), смещение от края прямоугольника 1.2 -->
    <path d="M 1.7,1.5 C 1.7,1.5 2.3,0.3 3.0,0.1 C 3.7,0.3 4.3,1.5 4.3,1.5" fill="#FFFFFF" />
    <!-- Правое ушко: основание от 7.7 до 10.3 (центр ушка 9.0), смещение от края прямоугольника 1.2 -->
    <path d="M 7.7,1.5 C 7.7,1.5 8.3,0.3 9.0,0.1 C 9.7,0.3 10.3,1.5 10.3,1.5" fill="#FFFFFF" />

    <rect x="0.5" y="1.5" width="11" height="10" rx="1" fill="none" stroke="#FFFFFF" stroke-width="0.7" />
    <line x1="0.5" y1="5" x2="11.5" y2="5" stroke="#FFFFFF" stroke-width="0.7" />
    <circle cx="2.5" cy="3.5" r="0.3" fill="#FFFFFF" />
    <circle cx="4.5" cy="3.5" r="0.3" fill="#FFFFFF" />
    <circle cx="6.5" cy="3.5" r="0.3" fill="#FFFFFF" />
    <line x1="2.5" y1="7.5" x2="8.5" y2="7.5" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round" />
    <line x1="2.5" y1="9.5" x2="7.5" y2="9.5" stroke="#FFFFFF" stroke-width="0.5" stroke-linecap="round" />
    <path d="M 11,4 L 7.5,9 H 10 L 9,13 L 13,8 H 10 Z" fill="#FFFFFF" stroke="#000000" stroke-width="0.3" stroke-linejoin="round" />
</svg>
