<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
    <defs>
        <!-- Насыщенный градиент фона (глубокий графит) -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#323438"/>
            <stop offset="100%" stop-color="#18191B"/>
        </linearGradient>

        <!-- Более яркий градиент корпуса консоли -->
        <linearGradient id="console-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4E5157"/>
            <stop offset="100%" stop-color="#2D2F33"/>
        </linearGradient>

        <!-- Мощное неоновое свечение для молнии -->
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.8" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Тень для четкого отделения элементов -->
        <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2.5" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
    </defs>

    <!-- Темный скругленный фон иконки с более четкой рамкой -->
    <rect x="1" y="1" width="38" height="38" rx="10" fill="url(#bg-grad)" stroke="#51545B" stroke-width="1"/>

    <!-- Группа терминала -->
    <g filter="url(#soft-shadow)">
        <!-- "Ушки" Android (более насыщенный зеленый) -->
        <path d="M 10,10 C 10,7.5 11,6 12,6 C 13,6 14,7.5 14,10" fill="#42FF95"/>
        <path d="M 22,10 C 22,7.5 23,6 24,6 C 25,6 26,7.5 26,10" fill="#42FF95"/>

        <!-- Основной корпус консоли -->
        <rect x="5" y="10" width="30" height="22" rx="3" fill="url(#console-grad)" stroke="#6B7078" stroke-width="1"/>

        <!-- Панель управления (Яркие Traffic lights) -->
        <circle cx="8.5" cy="13.5" r="0.9" fill="#FF5F56"/>
        <circle cx="11" cy="13.5" r="0.9" fill="#FFBD2E"/>
        <circle cx="13.5" cy="13.5" r="0.9" fill="#27C93F"/>

        <!-- Контрастная разделительная линия -->
        <line x1="5" y1="16" x2="35" y2="16" stroke="#5C6068" stroke-width="1"/>

        <!-- Яркие индикаторы логов -->
        <!-- Debug -->
        <circle cx="9.5" cy="20.5" r="1.2" fill="#409EFF"/>
        <rect x="13" y="19.8" width="16" height="1.4" rx="0.7" fill="#C3C8D6"/>

        <!-- Info -->
        <circle cx="9.5" cy="24.5" r="1.2" fill="#42FF95"/>
        <rect x="13" y="23.8" width="10" height="1.4" rx="0.7" fill="#C3C8D6"/>

        <!-- Warning -->
        <circle cx="9.5" cy="28.5" r="1.2" fill="#FFD600"/>
        <rect x="13" y="27.8" width="8" height="1.4" rx="0.7" fill="#C3C8D6"/>
    </g>

    <!-- Молния (Максимальный акцент) -->
    <g filter="url(#neon-glow)">
        <!-- Внешнее свечение (более плотное) -->
        <path d="M 31,17 L 24,26 H 28 L 26,34 L 34,25 H 30 Z" fill="#00FF88" opacity="0.45"/>
        <!-- Основное тело молнии -->
        <path d="M 31,17 L 24,26 H 28 L 26,34 L 34,25 H 30 Z" fill="#FFFFFF" stroke="#00FF88" stroke-width="1.3" stroke-linejoin="round"/>
        <!-- Внутреннее "ядро" -->
        <path d="M 31,17.5 L 24.5,25.5 H 28.5 L 26.5,33 L 33.5,24.5 H 29.5 Z" fill="#FFFFFF"/>
    </g>
</svg>
