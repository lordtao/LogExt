<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
    <defs>
        <!-- Светлый фон с более четким градиентом -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FDFDFD"/>
            <stop offset="100%" stop-color="#E2E5E9"/>
        </linearGradient>

        <!-- Контрастный корпус консоли (чуть более серый для выделения) -->
        <linearGradient id="console-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#F5F7FA"/>
            <stop offset="100%" stop-color="#CED4DE"/>
        </linearGradient>

        <!-- Четкое свечение молнии -->
        <filter id="neon-glow" x="-40%" y="-40%" width="180%" height="180%">
            <feGaussianBlur stdDeviation="1.2" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>

        <!-- Усиленная тень для четкого отделения от фона IDE -->
        <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.25"/>
        </filter>
    </defs>

    <!-- Подложка иконки с усиленной рамкой -->
    <rect x="1" y="1" width="38" height="38" rx="10" fill="url(#bg-grad)" stroke="#A0A5B0" stroke-width="1.2"/>

    <!-- Группа терминала -->
    <g filter="url(#soft-shadow)">
        <!-- "Ушки" Android (насыщенный зеленый) -->
        <path d="M 10,10 C 10,7.5 11,6 12,6 C 13,6 14,7.5 14,10" fill="#2BB064"/>
        <path d="M 22,10 C 22,7.5 23,6 24,6 C 25,6 26,7.5 26,10" fill="#2BB064"/>

        <!-- Корпус консоли с более жирной обводкой -->
        <rect x="5" y="10" width="30" height="22" rx="3" fill="url(#console-grad)" stroke="#808691" stroke-width="1.2"/>

        <!-- Панель управления (Насыщенные Traffic lights) -->
        <circle cx="8.5" cy="13.5" r="0.9" fill="#ED6A5E"/>
        <circle cx="11" cy="13.5" r="0.9" fill="#F4BF4F"/>
        <circle cx="13.5" cy="13.5" r="0.9" fill="#61C554"/>

        <!-- Контрастная разделительная линия -->
        <line x1="5" y1="16" x2="35" y2="16" stroke="#808691" stroke-width="1"/>

        <!-- Акцентные индикаторы логов -->
        <!-- Debug -->
        <circle cx="9.5" cy="20.5" r="1.3" fill="#2D7FF9"/>
        <rect x="13" y="19.8" width="16" height="1.6" rx="0.8" fill="#4B4E54"/>

        <!-- Info -->
        <circle cx="9.5" cy="24.5" r="1.3" fill="#2BB064"/>
        <rect x="13" y="23.8" width="10" height="1.6" rx="0.8" fill="#4B4E54"/>

        <!-- Warning -->
        <circle cx="9.5" cy="28.5" r="1.3" fill="#E89218"/>
        <rect x="13" y="27.8" width="8" height="1.6" rx="0.8" fill="#4B4E54"/>
    </g>

    <!-- Молния (Максимальный контраст) -->
    <g filter="url(#neon-glow)">
        <!-- Внешнее свечение -->
        <path d="M 31,17 L 24,26 H 28 L 26,34 L 34,25 H 30 Z" fill="#00A844" opacity="0.3"/>
        <!-- Основное тело молнии с темным контуром -->
        <path d="M 31,17 L 24,26 H 28 L 26,34 L 34,25 H 30 Z" fill="#FFFFFF" stroke="#008A37" stroke-width="1.2" stroke-linejoin="round"/>
        <!-- Внутренний акцент -->
        <path d="M 31,17.5 L 24.5,25.5 H 28.5 L 26.5,33 L 33.5,24.5 H 29.5 Z" fill="#FFFFFF"/>
    </g>
</svg>
